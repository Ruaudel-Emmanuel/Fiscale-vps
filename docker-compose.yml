version: "3.9"

services:
  facturx-api:
    build: .
    container_name: facturx-api
    restart: unless-stopped
    volumes:
      - ./output:/app/output
      - ./tmp:/app/tmp
    expose:
      - "8000"
    networks:
      - facturx-net

  nginx:
    image: nginx:stable-alpine
    container_name: facturx-nginx
    restart: unless-stopped
    depends_on:
      - facturx-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/facturx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - facturx-net

networks:
  facturx-net:
    driver: bridge